<div id="app-top" tabindex="-1"></div>
@if (showNavbar()) {
	<app-navbar></app-navbar>
}
<main id="main-content" class="focus:outline-none" [class.pb-20]="showNavbar()" tabindex="-1">
	<router-outlet />
</main>
@if (showFooter()) {
	<app-footer></app-footer>
}

@if (showNavbar()) {
  <app-bottom-nav></app-bottom-nav>
}

<app-destaque-popup></app-destaque-popup>
<app-toast-container></app-toast-container>
<app-install-banner></app-install-banner>

@if (loginModalService.isOpen()) {
  <app-bride-login-modal (close)="loginModalService.close()"></app-bride-login-modal>
}
