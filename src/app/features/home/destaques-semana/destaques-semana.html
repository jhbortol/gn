<section [class]="transparentBg ? 'destaques-grid' : 'bg-rose-50 py-16 destaques-grid'">
  <div class="container mx-auto px-4">
    <ng-container *ngIf="(destaques$ | async) as destaques; else loading">
      <ng-container *ngIf="destaques.length; else empty">
      <div class="flex overflow-x-auto md:grid md:grid-cols-4 gap-6 min-h-[450px] snap-x snap-mandatory hide-scrollbar pb-4 md:pb-0">
        <div *ngFor="let destaque of destaques; trackBy: trackById" 
             class="min-w-[85vw] md:min-w-0 snap-center flex-shrink-0 bg-white rounded-2xl shadow-md hover:shadow-2xl border border-gray-100 flex flex-col transition-all duration-300 md:hover:-translate-y-2 overflow-hidden group h-full">
           <div class="relative h-48 overflow-hidden" style="aspect-ratio:300/220;">
               <img [src]="destaque.imagem" loading="lazy" decoding="async" width="300" height="220"
                 [alt]="destaque.nome" 
                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                 (load)="onImgLoad($event, destaque)"
                 (error)="onImgError($event, destaque)" />
               <button
                 type="button"
                 (click)="toggleFavorite($event, destaque)"
                 class="absolute top-2 right-2 z-20 p-2 rounded-full bg-white/85 hover:bg-white backdrop-blur-sm shadow-md hover:shadow-lg transition-all duration-300 transform hover:scale-110 active:scale-95 flex items-center justify-center border border-gray-100"
                 [attr.aria-label]="isFavorite(destaque.id) ? 'Remover dos favoritos' : 'Adicionar aos favoritos'"
               >
                 <svg
                   xmlns="http://www.w3.org/2000/svg"
                   [class.text-rose-500]="isFavorite(destaque.id)"
                   [class.text-gray-400]="!isFavorite(destaque.id)"
                   [attr.fill]="isFavorite(destaque.id) ? 'currentColor' : 'none'"
                   class="w-4 h-4 transition-colors duration-300"
                   viewBox="0 0 24 24"
                   stroke="currentColor"
                   stroke-width="2"
                 >
                   <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                 </svg>
               </button>
           </div>
          <div class="p-5 flex flex-col flex-1">
            <span class="bg-rose-500 text-white font-bold text-xs px-3 py-1 rounded-full w-fit mb-3">{{ destaque.categoria }}</span>
            <h3 class="font-serif font-bold text-xl text-gray-900 mb-2">{{ destaque.nome }}</h3>
            <div class="flex items-center gap-2 text-gray-500 text-sm mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 12.414a2 2 0 00-2.828 0l-4.243 4.243M15 11V7a4 4 0 10-8 0v4" /></svg>
              {{ destaque.local }}
            </div>
             <a [routerLink]="buildUrl(['fornecedores', destaque.slug])" 
               [attr.data-event-category]="'Navigation'"
               [attr.data-event-action]="'Click Ver Perfil - Destaque'"
               [attr.data-vendor-id]="destaque.id"
               [attr.data-vendor-name]="destaque.nome"
               [attr.data-vendor-category]="destaque.categoria"
               class="mt-auto block px-6 py-3 border border-rose-400 text-rose-600 bg-white rounded-lg font-semibold hover:bg-rose-50 transition-all duration-300 text-center shadow-sm hover:shadow-md">
              Ver Perfil Completo
            </a>
          </div>
        </div>
        <!-- View More CTA Card -->
        <div *ngIf="showViewMoreCard" class="min-w-[85vw] md:min-w-0 snap-center flex-shrink-0 bg-gradient-to-br from-rose-50 to-white rounded-2xl shadow-md hover:shadow-2xl border border-rose-100 flex flex-col transition-all duration-300 md:hover:-translate-y-2 overflow-hidden group h-full justify-center items-center p-6 text-center">
          <div class="w-16 h-16 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 mb-6 group-hover:scale-110 group-hover:bg-rose-500 group-hover:text-white transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
          </div>
          <h3 class="font-serif font-bold text-xl text-gray-900 mb-3">Não encontrou o que procurava?</h3>
          <p class="text-gray-500 text-sm mb-8">Descubra milhares de profissionais para o seu casamento em nosso portal.</p>
          <a [routerLink]="viewMoreLink" class="px-8 py-3 bg-rose-600 text-white rounded-lg font-semibold hover:bg-rose-700 transition-colors shadow-md hover:shadow-lg w-full">
            Explore mais fornecedores
          </a>
        </div>
      </div>
      </ng-container>
      <ng-template #empty>
        <div class="text-center py-12 text-gray-400">
          <p class="text-lg">Nenhum destaque disponível no momento.</p>
        </div>
      </ng-template>
    </ng-container>
    <ng-template #loading>
      <div class="flex overflow-x-auto md:grid md:grid-cols-4 gap-6 min-h-[450px] snap-x snap-mandatory hide-scrollbar pb-4 md:pb-0">
        <div *ngFor="let i of [1,2,3,4]" class="min-w-[85vw] md:min-w-0 snap-center flex-shrink-0 bg-white rounded-2xl border border-gray-100 p-5 animate-pulse h-full flex flex-col">
          <div class="mb-4 bg-gray-200 w-full" style="height:192px;aspect-ratio:300/220;"></div>
          <div class="h-6 bg-gray-200 rounded w-2/3 mb-3"></div>
          <div class="h-4 bg-gray-200 rounded w-1/2 mb-6"></div>
          <div class="mt-auto h-10 bg-gray-200 rounded w-full"></div>
        </div>
      </div>
      <div class="text-center text-xs text-gray-400 mt-2">Carregando destaques...</div>
    </ng-template>
  </div>
</section>
