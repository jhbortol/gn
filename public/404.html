<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página não encontrada - Guia Noivas</title>
  <meta name="robots" content="noindex, follow">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 72px;
      font-weight: bold;
      color: #be123c;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: #be123c;
      color: white;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s;
      margin-right: 12px;
    }
    a:hover {
      background: #9a0e2f;
    }
    a.secondary {
      background: transparent;
      color: #be123c;
      border: 2px solid #be123c;
    }
    a.secondary:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! A página que você está procurando não foi encontrada.</p>
    <p style="font-size: 16px; color: #999; margin-bottom: 40px;">A URL pode estar incorreta ou a página pode ter sido removida.</p>
    <a href="/">Voltar para Home</a>
    <a href="/piracicaba/categorias" class="secondary">Explorar Categorias</a>
  </div>
</body>
</html>
