<section class="page-shell card">
  <p class="page-eyebrow">Recuperar por WhatsApp</p>
  <h1>Receba um OTP para restaurar seu casamento</h1>

  <label>
    <span>WhatsApp</span>
    <input [(ngModel)]="whatsappNumber" placeholder="19999999999">
  </label>

  <button type="button" class="primary" [disabled]="loading" (click)="sendOtp()">Enviar OTP</button>

  <label>
    <span>OTP (6 dígitos)</span>
    <input [(ngModel)]="otp" maxlength="6" placeholder="847291">
  </label>

  <button type="button" class="secondary" [disabled]="loading" (click)="verifyOtp()">Verificar OTP e restaurar</button>

  <p *ngIf="maskedNumber" class="helper">Número mascarado: {{ maskedNumber }} · validade {{ expiresInSeconds }}s</p>
  <p *ngIf="message" class="success">{{ message }}</p>
  <p *ngIf="error" class="error">{{ error }}</p>
</section>
