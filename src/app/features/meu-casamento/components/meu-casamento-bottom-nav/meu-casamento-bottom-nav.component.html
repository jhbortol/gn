<div class="bottom-nav-container" [class.collapsed]="isCollapsed">
  <button class="toggle-btn" (click)="toggleCollapse()" [attr.aria-label]="isCollapsed ? 'Expandir menu' : 'Recolher menu'">
    <svg *ngIf="!isCollapsed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
      <path d="M12 16L6 10H18L12 16Z"></path>
    </svg>
    <svg *ngIf="isCollapsed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
      <path d="M12 8L18 14H6L12 8Z"></path>
    </svg>
  </button>
  <nav class="bottom-nav" aria-label="Navegação do módulo Meu Casamento">
    <a routerLink="/meu-casamento" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
      <span class="icon" aria-hidden="true">⌂</span>
      <span>Início</span>
    </a>
    <a routerLink="/meu-casamento/convidados" routerLinkActive="is-active">
      <span class="icon" aria-hidden="true">👥</span>
      <span>Convidados</span>
    </a>
    <a routerLink="/meu-casamento/cronograma" routerLinkActive="is-active">
      <span class="icon" aria-hidden="true">✓</span>
      <span>Checklist</span>
    </a>
    <a routerLink="/meu-casamento/orcamento" routerLinkActive="is-active">
      <span class="icon" aria-hidden="true">¤</span>
      <span>Orçamento</span>
    </a>
    <a routerLink="/meus-favoritos" routerLinkActive="is-active">
      <span class="icon" aria-hidden="true">♥</span>
      <span>Favoritos</span>
    </a>
  </nav>
</div>
